<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>PriSkin Admin</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body class="admin-page">
<section id="login" class="login">
  <h1>PriSkin Admin</h1>
  <p>Panel privado.</p>
  <input id="password" type="password" placeholder="Contraseña">
  <button id="loginBtn">Entrar</button>
  <small>Contraseña: <b>priskin2026</b></small>
</section>

<main id="dashboard" class="dashboard hidden">
  <aside>
    <a class="logo" href="index.html"><b>PriSkin</b><span>Admin</span></a>
    <button id="newBtn">+ Nuevo producto</button>
    <button id="exportBtn" class="light">Descargar products.json</button>
    <button id="logoutBtn" class="light">Salir</button>
    <p>Los cambios se guardan en tu navegador. Para hacerlos públicos, descarga products.json y reemplázalo en GitHub.</p>
  </aside>
  <section class="admin-main">
    <h1>Productos</h1>
    <div class="editor">
      <input type="hidden" id="productId">
      <input id="name" placeholder="Nombre">
      <input id="brand" placeholder="Marca">
      <input id="category" placeholder="Categoría">
      <input id="price" placeholder="Precio XMAYOR">
      <label>Imagen <input id="image" type="file" accept="image/*"></label>
      <textarea id="description" placeholder="Descripción"></textarea>
      <button id="saveBtn">Guardar</button>
      <button id="cancelBtn" class="light">Limpiar</button>
    </div>
    <div id="adminList" class="admin-list"></div>
  </section>
</main>
<script src="js/admin.js"></script>
</body>
</html>
