<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>PriSkin · Admin</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body class="admin-body">
<section id="login" class="login-card">
  <h1>PriSkin Admin</h1>
  <p>Panel privado para editar productos.</p>
  <input id="password" type="password" placeholder="Contraseña">
  <button id="loginBtn">Entrar</button>
  <small>Contraseña inicial: <strong>priskin2026</strong></small>
</section>

<main id="dashboard" class="admin hidden">
  <aside>
    <a class="logo" href="index.html"><span>PriSkin</span><small>Admin</small></a>
    <button id="newBtn">+ Nuevo producto</button>
    <button id="exportBtn" class="light">Descargar datos</button>
    <button id="logoutBtn" class="light">Salir</button>
    <p>Los cambios se guardan localmente. Para publicarlos globalmente, descarga products.json y actualiza el repo.</p>
  </aside>

  <section class="admin-main">
    <div class="admin-header">
      <div>
        <p class="eyebrow">Dashboard</p>
        <h1>Productos</h1>
      </div>
      <a class="whatsapp" href="index.html">Ver catálogo</a>
    </div>

    <section class="editor">
      <input type="hidden" id="productId">
      <input id="name" placeholder="Nombre">
      <input id="brand" placeholder="Marca">
      <input id="category" placeholder="Categoría">
      <input id="price" placeholder="Precio XMAYOR">
      <label>Imagen <input id="image" type="file" accept="image/*"></label>
      <textarea id="description" placeholder="Descripción"></textarea>
      <button id="saveBtn">Guardar producto</button>
      <button id="cancelBtn" class="light">Limpiar</button>
    </section>

    <section id="adminList" class="admin-list"></section>
  </section>
</main>

<script src="js/admin.js"></script>
</body>
</html>
